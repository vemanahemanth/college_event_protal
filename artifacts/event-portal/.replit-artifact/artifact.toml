kind = "web"
previewPath = "/"
title = "College Event Intelligence Portal"
version = "1.0.0"
id = "artifacts/event-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21436

[services.development]
run = "pnpm --filter @workspace/event-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-portal", "run", "build" ]
publicDir = "artifacts/event-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21436"
BASE_PATH = "/"
