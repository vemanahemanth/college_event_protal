services:
  - type: web
    name: api-server
    env: node
    buildCommand: pnpm install && pnpm -r --if-present run build && cd lib/db && pnpm run push
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portal-db
          property: connectionString
      - key: PORT
        value: 10000

  - type: web
    name: event-portal
    env: static
    buildCommand: pnpm install && pnpm -r --if-present run build
    staticPublishPath: artifacts/event-portal/dist/public
    envVars:
      - key: VITE_API_URL
        value: https://api-server.onrender.com

databases:
  - name: portal-db
    databaseName: portal_db
    user: admin
    plan: free
